<!DOCTYPE html>
<html lang="en" dir="ltr" x-data="appData()" :class="{ 'dark': darkMode }" :dir="ltr ? 'ltr' : 'rtl'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">

    <title>404 - Page Not Found | GreenRoof</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#10b981', darkBg: '#0f172a', darkCard: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-slate-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300 overflow-hidden">

    <header class="p-6 flex justify-between items-center w-full absolute top-0 left-0 z-50">
        <a href="index.html" class="group">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9  flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform">🌱</div>
                <span class="text-xl font-bold font-[Outfit] tracking-tight text-primary">GreenRoof</span>
            </div>
        </a>

        <div class="flex items-center gap-2 bg-white/80 dark:bg-darkCard/80 backdrop-blur-sm p-1.5 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
            <button @click="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                <span x-text="darkMode ? '☀️' : '🌙'"></span>
            </button>
            <button @click="toggleLtr()" class="w-10 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all text-[10px] font-bold text-gray-500">
                <span x-text="ltr ? 'LTR' : 'RTL'"></span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-primary/10 rounded-full blur-[100px] -z-10"></div>

        <div class="text-center max-w-lg">
            <h1 class="text-[120px] md:text-[180px] font-black leading-none text-gray-200 dark:text-gray-800 select-none">
                404
            </h1>
            
            <div class="-mt-10 md:-mt-16 relative">
                <div class="text-5xl md:text-7xl mb-6 animate-bounce">🍂</div>
                <h2 class="text-2xl md:text-4xl font-extrabold font-[Outfit] mb-4">The path is overgrown...</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base mb-10 leading-relaxed">
                    The page you're looking for has moved or no longer exists. Let's get you back to the garden.
                </p>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <a href="index.html" class="w-full sm:w-auto px-8 py-4 bg-primary text-white rounded-2xl font-bold shadow-xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-home"></i>
                        Back to Home
                    </a>
                    <a href="contact.html" class="w-full sm:w-auto px-8 py-4 border border-gray-200 dark:border-gray-700 rounded-2xl font-bold hover:bg-gray-100 dark:hover:bg-gray-800 transition-all text-sm">
                        Report Issue
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-xs text-gray-400 uppercase tracking-widest font-medium">
        &copy; 2026 GreenRoof Solutions
    </footer>

    <script>
        function appData() {
            return {
                darkMode: localStorage.getItem('theme') === 'dark',
                ltr: localStorage.getItem('dir') !== 'rtl',
                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                },
                toggleLtr() {
                    this.ltr = !this.ltr;
                    localStorage.setItem('dir', this.ltr ? 'ltr' : 'rtl');
                }
            }
        }
    </script>
</body>
</html>
