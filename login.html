<!DOCTYPE html>
<html lang="en" dir="ltr" x-data="appData()" :class="{ 'dark': darkMode }" :dir="ltr ? 'ltr' : 'rtl'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">

    <title>Login | GreenRoof Urban Farming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#10b981', darkBg: '#0f172a', darkCard: '#1e293b' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-slate-900 dark:bg-darkBg dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="p-6 flex justify-between items-center w-full absolute top-0 left-0 z-50">
        <a href="index.html" class="group">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-primary rounded-lg flex items-center justify-center text-white shadow-lg shadow-primary/20 group-hover:scale-110 transition-transform">🌱</div>
                <span class="text-xl font-bold font-[Outfit] tracking-tight text-primary">GreenRoof</span>
            </div>
        </a>

        <div class="flex items-center gap-2 bg-white/80 dark:bg-darkCard/80 backdrop-blur-sm p-1.5 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm">
            <button @click="toggleTheme()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                <span x-text="darkMode ? '☀️' : '🌙'"></span>
            </button>
            <button @click="toggleLtr()" class="w-10 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-all text-[10px] font-bold text-gray-500">
                <span x-text="ltr ? 'LTR' : 'RTL'"></span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 pt-20 pb-10">
        <div class="w-full max-w-[400px] bg-white dark:bg-darkCard p-8 md:p-10 rounded-[2.5rem] shadow-2xl shadow-primary/5 border border-gray-100 dark:border-gray-800" x-data="{ showPass: false }">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl md:text-3xl font-extrabold font-[Outfit] mb-2">Welcome Back</h1>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Manage your urban farm dashboard</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8">
                <button class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-all text-sm font-medium">
                    <i class="fab fa-google text-red-500"></i> Google
                </button>
                <button class="flex items-center justify-center gap-2 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-all text-sm font-medium">
                    <i class="fab fa-apple text-slate-900 dark:text-white"></i> Apple
                </button>
            </div>

            <div class="relative flex items-center justify-center mb-8">
                <span class="absolute inset-x-0 h-px bg-gray-100 dark:bg-gray-800"></span>
                <span class="relative px-4 bg-white dark:bg-darkCard text-xs text-gray-400 uppercase tracking-widest">Or email</span>
            </div>

            <form action="#" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 ml-1">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="w-full px-5 py-3.5 bg-gray-50 dark:bg-darkBg border border-gray-100 dark:border-gray-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:placeholder:text-gray-600">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2 ml-1">Password</label>
                    <div class="relative">
                        <input :type="showPass ? 'text' : 'password'" placeholder="••••••••" class="w-full px-5 py-3.5 bg-gray-50 dark:bg-darkBg border border-gray-100 dark:border-gray-800 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all dark:placeholder:text-gray-600">
                        <button type="button" @click="showPass = !showPass" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
                            <i class="fa-solid" :class="showPass ? 'fa-eye-slash' : 'fa-eye'"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary">
                        <span class="text-gray-500 dark:text-gray-400 group-hover:text-slate-700 transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-primary font-semibold hover:underline">Forgot?</a>
                </div>

                <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-bold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-gray-500">
                Don't have an account? <a href="regesiter.html" class="text-primary font-bold hover:underline">Create Account</a>
            </p>
        </div>
    </main>

    <script>
        function appData() {
            return {
                darkMode: localStorage.getItem('theme') === 'dark',
                ltr: localStorage.getItem('dir') !== 'rtl',
                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                },
                toggleLtr() {
                    this.ltr = !this.ltr;
                    localStorage.setItem('dir', this.ltr ? 'ltr' : 'rtl');
                }
            }
        }
    </script>
</body>
</html>
